<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ffb7c5;
  --pink2:#ff8fa3;
  --text:#555;
}
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f0f0f0;
  font-family:Montserrat,sans-serif;
}
.card{
  width:260px;
  height:200px;
  border-radius:35px;
  background:linear-gradient(135deg,#fff5f7,#ffe4e1);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:
    20px 20px 60px #e6d5d8,
    -20px -20px 60px #ffffff;
  position:relative;
  overflow:hidden;
}
.plane-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
.month-year{
  font-size:14px;
  letter-spacing:2px;
  color:var(--pink2);
  font-weight:600;
  position:relative;
}
.day{
  font-family:"Great Vibes",cursive;
  font-size:70px;
  color:var(--text);
  line-height:1;
  margin:8px 0;
  position:relative;
}
.weekday{
  background:var(--pink);
  color:white;
  padding:6px 18px;
  border-radius:100px;
  font-size:13px;
  box-shadow:0 4px 10px rgba(255,183,197,.4);
  position:relative;
}
</style>
</head>
<body>
<div class="card">
  <svg class="plane-bg" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">

    <!-- 軌跡の点線：左下→右上 -->
    <path d="M15 175 Q90 130 200 45"
          stroke="#ffb7c5" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-dasharray="6 10" opacity="0.8"/>

    <!-- ✈ 飛行機シルエット（右上・大きめ・濃いめ） -->
    <!-- 右上コーナー付近 transform で配置 & 傾け -->
    <g transform="translate(205, 38) rotate(-40) scale(1.5)" opacity="0.55">
      <!-- 胴体 -->
      <ellipse cx="0" cy="0" rx="20" ry="5" fill="#e8607a"/>
      <!-- 主翼（左右） -->
      <path d="M-2 -1 L-12 -18 L2 -11 L5 -1 Z" fill="#e8607a"/>
      <path d="M-2  1 L-12  18 L2  11 L5  1 Z" fill="#e8607a"/>
      <!-- 水平尾翼 -->
      <path d="M-16 -1 L-22 -8 L-18 -5 L-15 -1 Z" fill="#e8607a"/>
      <path d="M-16  1 L-22  8 L-18  5 L-15  1 Z" fill="#e8607a"/>
      <!-- 垂直尾翼 -->
      <path d="M-16 0 L-23 -9 L-17 -3 Z" fill="#e8607a"/>
      <!-- 機首 -->
      <ellipse cx="19" cy="0" rx="4" ry="3" fill="#e8607a"/>
    </g>

    <!-- 小さな雲（左上） -->
    <g opacity="0.3" transform="translate(18, 30)">
      <circle cx="0"  cy="6"  r="7"  fill="#ffb7c5"/>
      <circle cx="9"  cy="2"  r="9"  fill="#ffb7c5"/>
      <circle cx="20" cy="5"  r="7"  fill="#ffb7c5"/>
      <rect   x="-1" y="6"  width="22" height="8" fill="#ffb7c5"/>
    </g>

    <!-- 小さな雲（右下） -->
    <g opacity="0.2" transform="translate(190, 155)">
      <circle cx="0"  cy="5" r="5"  fill="#ffb7c5"/>
      <circle cx="7"  cy="2" r="7"  fill="#ffb7c5"/>
      <circle cx="16" cy="5" r="5"  fill="#ffb7c5"/>
      <rect   x="-1" y="5" width="18" height="6" fill="#ffb7c5"/>
    </g>
  </svg>

  <div id="m-y" class="month-year"></div>
  <div id="d"   class="day"></div>
  <div id="w"   class="weekday"></div>
</div>

<script>
function update(){
  const n = new Date();
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const weeks  = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY',
                  'THURSDAY','FRIDAY','SATURDAY'];
  document.getElementById("m-y").innerText = months[n.getMonth()]+" "+n.getFullYear();
  document.getElementById("d").innerText   = n.getDate();
  document.getElementById("w").innerText   = weeks[n.getDay()];
}
update();
setInterval(update, 60000);
</script>
</body>
</html>
