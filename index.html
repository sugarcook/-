<!DOCTYPE html>
<html lang="ja">
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
  body {
    background-color: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Quicksand', 'M PLUS Rounded 1c', sans-serif;
  }
  .widget {
    background: linear-gradient(135deg, #fff5f7 0%, #ffe4e1 100%);
    border: 3px solid #ffcad4;
    border-radius: 30px;
    padding: 30px;
    width: 200px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4);
    transition: transform 0.3s ease;
  }
  .widget:hover {
    transform: translateY(-5px);
  }
  .month-year {
    color: #ff8fa3;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }
  .day {
    color: #5d5d5d;
    font-size: 4.5rem;
    font-weight: 700;
    line-height: 1;
    margin: 10px 0;
  }
  .weekday {
    display: inline-block;
    background-color: #ffb3c1;
    color: white;
    padding: 5px 15px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="month-year" id="month-year"></div>
    <div class="day" id="day"></div>
    <div class="weekday" id="weekday"></div>
  </div>

  <script>
    function updateDate() {
      const now = new Date();
      const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
      const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      
      document.getElementById('month-year').innerText = `${months[now.getMonth()]} ${now.getFullYear()}`;
      document.getElementById('day').innerText = now.getDate();
      document.getElementById('weekday').innerText = days[now.getDay()];
    }
    updateDate();
  </script>
</body>
</html>
